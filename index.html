    <script>
      // Deteksi device
      const isTouchDevice = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

      // Pagar Gaib 1: Klik Kanan
      document.addEventListener('contextmenu', e => {
        e.preventDefault();
        if (!isTouchDevice()) {
          alert('Mau Bobol Web nya bang? Sorry Ga Bisa\n\nWeb ini dijagain sama Pagar Gaib Rickymorenoar.\nNakys Store Owner was here. 😂');
        }
      });

      // Pagar Gaib 2: Shortcut Keyboard (Ctrl+U, F12, dkk)
      document.onkeydown = e => {
        if (
          e.keyCode === 123 || // F12
          (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Ctrl+Shift+I/J/C
          (e.ctrlKey && e.keyCode === 85) // Ctrl+U (View Source)
        ) {
          e.preventDefault();
          return false;
        }
      };

      console.log("%cSTOP!", "color: red; font-size: 50px; font-weight: bold; -webkit-text-stroke: 1px black;");
      console.log("%cGokil, lu bisa tembus! Tapi tetep aja, ini buatan Rickymorenoar.", "color: #3b82f6; font-size: 18px; font-weight: bold;");
      console.log("%c⚠️ Web ini diproteksi Pagar Gaib. Nakys Store Owner was here.", "color: gray; font-style: italic; font-size: 13px;");
      
      // Tambahan: Cegah Drag Image (Biar foto kelas gak dicolong gampang)
      document.addEventListener('dragstart', e => {
        if (e.target.nodeName === 'IMG') e.preventDefault();
      });
